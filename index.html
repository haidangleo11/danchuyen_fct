                ScamCheck là công cụ giáo dục. Đánh giá của ứng dụng không thay thế cảnh báo chính thức từ cơ quan chức năng.

    <script>
        const OBFS_KEY = "=oVdkx2YS1WVQpXVCFlaCllZpV2QnlFdJllRzIWekd0VkZEaPpkURRjcil2VtpFWzgGUIZ1XrN3Z";
        
        function getRealApiKey() {
            let reversedBase64 = OBFS_KEY.split('').reverse().join('');
            return atob(reversedBase64);
        }
        
        const CONFIG = {
            apiKey: getRealApiKey()
        };

        // --- CẤU HÌNH SPEECH TO TEXT ---
        let speechRecognition;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            speechRecognition = new SpeechRecognition();
            speechRecognition.continuous = false; // Chỉ thu một đoạn, nếu muốn thu dài có thể đổi thành true
            speechRecognition.interimResults = true;
            speechRecognition.lang = 'vi-VN';

            speechRecognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                const input = document.getElementById('messageInput');
                // Nếu có kết quả cuối cùng (Final), nối thêm vào textarea
                if (finalTranscript) {
                    input.value = (input.value + ' ' + finalTranscript).trim();
                }
            };
            
            speechRecognition.onend = function() {
                isRecording = false;
                updateMicUI();
            };
            
            speechRecognition.onerror = function(event) {
                console.error("Speech recognition error:", event.error);
                isRecording = false;
                updateMicUI();
                if (event.error === 'not-allowed') {
                    alert("Trình duyệt không được phép sử dụng Micro. Vui lòng cấp quyền Micro trong cài đặt trình duyệt ạ.");
                }
            };
        } else {
            console.warn("Speech Recognition API không được hỗ trợ trên trình duyệt này.");
        }

        function toggleSpeechRecognition() {
            if (!speechRecognition) {
                alert("Rất tiếc, trình duyệt của bác không hỗ trợ nhận diện giọng nói. Bác hãy thử dùng Google Chrome, Edge hoặc Safari bản mới nhất nhé!");
                return;
            }
            if (isRecording) {
                speechRecognition.stop();
            } else {
                try {
                    speechRecognition.start();
                    isRecording = true;
                } catch (e) {
                    console.error("Lỗi khi khởi động micro:", e);
                }
            }
            updateMicUI();
        }

        function updateMicUI() {
            const micBtn = document.getElementById('micBtn');
            if(isRecording) {
                micBtn.classList.add('text-red-500', 'bg-red-50', 'border-red-300', 'animate-pulse');
                micBtn.classList.remove('text-gray-500', 'bg-gray-50', 'hover:text-blue-600', 'hover:bg-blue-50', 'hover:border-blue-300', 'border-gray-200');
            } else {
                micBtn.classList.remove('text-red-500', 'bg-red-50', 'border-red-300', 'animate-pulse');
                micBtn.classList.add('text-gray-500', 'bg-gray-50', 'hover:text-blue-600', 'hover:bg-blue-50', 'hover:border-blue-300', 'border-gray-200');
            }
        }
        // --- END SPEECH TO TEXT ---

        const CO_TAM_LY_PROMPT = `
            Bạn là "Cô tâm lý", một chuyên gia tư vấn tâm lý học hành vi chuyên hỗ trợ người cao tuổi phòng tránh lừa đảo mạng.
            Nhiệm vụ của bạn: Phân tích tin nhắn mà người dùng cung cấp và giải thích ngắn gọn cơ chế/chiêu thức tác động tâm lý (thao túng, đánh vào lòng tham, nỗi sợ hãi, sự khẩn cấp) mà kẻ lừa đảo đang sử dụng để khiến họ suýt tin.

            Yêu cầu nghiêm ngặt về phong cách:
            1. Giọng điệu: Gần gũi, ấm áp, thấu hiểu, tuyệt đối KHÔNG hù dọa, KHÔNG lên giọng dạy dỗ hay chỉ trích người dùng.
            2. Xưng hô: Bắt buộc xưng "cô" và gọi người dùng là "bác".
            3. Độ dài: Chỉ viết trong khoảng từ ĐÚNG 2 ĐẾN 3 CÂU.
            4. ĐẶC BIỆT: KHÔNG CÓ KÝ TỰ TIẾNG TRUNG QUỐC NÀO TRONG PROMPT!!!
        `;
        
        const RESCUE_PROMPT = `
        Bạn là chuyên gia ứng cứu lừa đảo trực tuyến.
        Nhiệm vụ:
        - Đọc nội dung người dùng nhập.
        - Đánh giá mức độ nguy hiểm.
        - Đưa ra hướng xử lý cụ thể.
        Trả về JSON duy nhất:
        {
            "level":"LOW|MEDIUM|HIGH|CRITICAL",
            "title":"Tiêu đề ngắn",
            "steps":[
                "Bước 1",
                "Bước 2",
                "Bước 3"
            ]
        }
        Không giải thích ngoài JSON.
        `;

        const QUIZ_PROMPT = `
        Bạn là chuyên gia giáo dục phòng chống lừa đảo mạng. 
        Dựa vào nội dung tin nhắn người dùng cung cấp, hãy tạo ra MỘT câu hỏi tình huống trắc nghiệm phản ứng nhanh giúp họ biết nên làm gì tiếp theo.
        Yêu cầu trả về ĐÚNG định dạng JSON sau, không giải thích gì thêm:
        {
            "question": "Câu hỏi tình huống (VD: Nếu nhận được tin nhắn này, bác nên làm gì?)",
            "options": [
                {
                    "text": "Nội dung phương án",
                    "emoji": "✅",
                    "isCorrect": true,
                    "advice": "Lời khuyên giải thích chi tiết tại sao đúng/sai."
                }
            ]
        }
        Lưu ý:
        - Xưng hô "chuyên gia" và "bác".
        - Tạo ra 3-4 phương án.
        - Chỉ có 1 phương án đúng (isCorrect: true) là hành động an toàn.
        - Các phương án sai (isCorrect: false) mô tả các hành động sai lầm thực tế (VD: bấm link, chuyển khoản, đọc OTP).
        `;

        const SYSTEM_PROMPT = `
            Bạn là chuyên gia phân tích lừa đảo trực tuyến của ScamCheck.
            Nhiệm vụ:
            * Phân tích tin nhắn người dùng cung cấp.
            * Xác định mức độ rủi ro:
            * "AN_TOAN" = có vẻ là thông báo hợp lệ.
            * "NGHI_NGO" = có dấu hiệu bất thường cần kiểm tra thêm.
            * "NGUY_HIEM" = có dấu hiệu lừa đảo rõ ràng.

            QUAN TRỌNG:
            KHÔNG được mặc định mọi tin nhắn chứa tên thương hiệu, ngân hàng hoặc cơ quan nhà nước là lừa đảo.
            Các trường hợp thường là AN_TOÀN nếu không xuất hiện dấu hiệu bất thường:
            * Mã OTP: "Mã OTP của bạn là 123456"
            * Thông báo đăng nhập: "Tài khoản của bạn vừa đăng nhập từ thiết bị mới"
            * Thông báo giao dịch: "Biến động số dư +500.000đ"
            * Thông báo đơn hàng: "Đơn hàng đang được vận chuyển"
            * Thông báo chính thức từ thương hiệu.

            Chỉ đánh giá là NGHI_NGO hoặc NGUY_HIEM khi xuất hiện một hoặc nhiều dấu hiệu sau:
            * Yêu cầu chuyển tiền.
            * Yêu cầu cung cấp OTP, mật khẩu, CCCD.
            * Yêu cầu cài APK hoặc ứng dụng lạ.
            * Đường link đáng ngờ hoặc giả mạo.
            * Đe dọa khóa tài khoản, liên quan pháp luật.
            * Tạo áp lực thời gian khẩn cấp.

            Luôn ưu tiên bằng chứng trong nội dung thực tế thay vì suy đoán.
            Trả về ĐÚNG MỘT JSON theo định dạng:
            {
                "risk":"AN_TOAN",
                "title":"An toàn",
                "desc":"Giải thích ngắn gọn.",
                "signs":["..."],
                "quotes":["..."],
                "actions":["..."]
            }
            Không trả lời gì ngoài JSON.
        `;

        async function getSituationalQuiz(message) {
            try {
                const response = await fetch(
                    "https://api.groq.com/openai/v1/chat/completions",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${CONFIG.apiKey}`
                        },
                        body: JSON.stringify({
                            model: "llama-3.3-70b-versatile",
                            response_format: { type: "json_object" },
                            messages: [
                                { role: "system", content: QUIZ_PROMPT },
                                { role: "user", content: message }
                            ]
                        })
                    }
                );
                const data = await response.json();
                return JSON.parse(data.choices[0].message.content);
            } catch (error) {
                console.error("Lỗi khi tạo câu hỏi tình huống:", error);
                return null;
            }
        }
        
        async function getRescuePlan(message) {
            try {
                const response = await fetch(
                    "https://api.groq.com/openai/v1/chat/completions",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${CONFIG.apiKey}`
                        },
                        body: JSON.stringify({
                            model: "llama-3.3-70b-versatile",
                            response_format: { type: "json_object" },
                            messages: [
                                { role: "system", content: RESCUE_PROMPT },
                                { role: "user", content: message }
                            ]
                        })
                    }
                );
                const data = await response.json();
                return JSON.parse(data.choices[0].message.content);
            } catch (error) {
                console.error(error);
                return {
                    level: "MEDIUM",
                    title: "Không thể tạo kế hoạch ứng cứu",

        function cleanJsonText(text) {
            let t = String(text || '').trim();
            if (t.startsWith('```json')) t = t.substring(7);
            if (t.endsWith('```')) t = t.substring(0, t.length - 3);
            t = t.trim();
            const startIdx = t.indexOf('{');
            const endIdx = t.lastIndexOf('}');
            if (startIdx !== -1 && endIdx !== -1) {
                return t.substring(startIdx, endIdx + 1);
            }
            return t;
        }

                quotes: Array.isArray(obj?.quotes) ? obj.quotes : [],

        async function scanMessageUrls(text) {
            if (!text) return [];
            const urlRegex = /(https?:\/\/[^\s<>"]+|www\.[^\s<>"]+|[a-zA-Z0-9-]+\.(?:com|vn|net|org|gov|top|cc|xyz|info|club)(?:\/[^\s<>"]*)?)/gi;
            const matches = text.match(urlRegex);
            if (!matches) return [];
            try {
                const response = await fetch(
                    "https://api.groq.com/openai/v1/chat/completions",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${CONFIG.apiKey}`
                        },
                        body: JSON.stringify({
                            model: "llama-3.3-70b-versatile",
                            response_format: { type: "json_object" },
                            messages: [
                                {
                                    role: "system",
                                    content: `
                                    Bạn là chuyên gia phát hiện URL lừa đảo.
                                    Trả về JSON:
                                    {
                                        "results":[
                                            {
                                                "url":"",
                                                "isFake":true,
                                                "fakeType":"",
                                                "warningReason":""
                                            }
                                        ]
                                    }
                                    `
                                },
                                {
                                    role: "user",
                                    content: JSON.stringify({ message: text, urls: matches })
                                }
                            ]
                        })
                    }
                );
                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);
                return result.results || [];
            } catch (err) {
                console.error(err);
                return matches.map(url => ({
                    originalUrl: url,
                    isFake: false,
                    fakeType: "",
                    warningReason: "Không phân tích được"
                }));
            }
        }

        let practiceIndex = 0, practiceScore = 0, currentPracticeSet = [], currentSetNumber = 0, answeredPractice = false;

        function startPractice() {
            practiceIndex = 0;
            practiceScore = 0;
            answeredPractice = false;
            if (usedPracticeSets.length === PRACTICE_SETS.length) {
                usedPracticeSets = [];
            }
            let available = [];
            for (let i = 0; i < PRACTICE_SETS.length; i++) {
                if (!usedPracticeSets.includes(i)) available.push(i);
            }
            const randomSetIndex = available[Math.floor(Math.random() * available.length)];
            usedPracticeSets.push(randomSetIndex);
            currentSetNumber = randomSetIndex + 1;
            currentPracticeSet = [...PRACTICE_SETS[randomSetIndex]].sort(() => Math.random() - 0.5);
            renderPracticeQuestion();
        }

            const q = currentPracticeSet[practiceIndex];
            const correct = choice === q.label;
            if (correct) practiceScore++;

            document.getElementById('practice-scam-btn').disabled = true;
            document.getElementById('practice-safe-btn').disabled = true;
            document.getElementById('practice-scam-btn').classList.add('opacity-50');
            document.getElementById('practice-safe-btn').classList.add('opacity-50');

            let resultClass = correct ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-300';
            let titleText = correct ? '✅ Nhận định chính xác!' : '❌ Nhận định chưa chuẩn';
            let titleColor = correct ? 'text-green-700' : 'text-red-700';
            
            let feedbackHTML = `
                <div class='mt-4 p-5 rounded-xl border-2 shadow-sm ${resultClass} animate-fade-in'>
                    <h4 class='font-bold text-xl ${titleColor}'>${titleText}</h4>
                    <p class='mt-2 text-base md:text-lg text-gray-800 font-medium'>Giải thích: ${q.reason}</p>
                    <button onclick='nextPractice()' class='mt-4 w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold text-lg transition-all shadow-md active:scale-95'>
                        Tiếp tục hành trình
                    </button>
                </div>`;
            document.getElementById('practiceArea').insertAdjacentHTML('beforeend', feedbackHTML);
        }

        function nextPractice() {
            practiceIndex++;
            if (practiceIndex >= currentPracticeSet.length) { renderPracticeResult(); return; }
            renderPracticeQuestion();
        }

        function renderPracticeResult() {
            let level = practiceScore === 5 ? '🏆 Chuyên gia phòng chống lừa đảo' : (practiceScore >= 3 ? '🌟 Khá tốt, cần cẩn thận hơn' : '⚠️ Cần rèn luyện thêm cảnh giác');
            let color = practiceScore === 5 ? 'text-green-600' : (practiceScore >= 3 ? 'text-yellow-600' : 'text-red-600');
            
            document.getElementById('practiceArea').innerHTML = `
                <div class='bg-white p-8 rounded-2xl shadow-md space-y-4 border border-gray-200 text-center'>
                    <div class='text-5xl mb-4'>${practiceScore === 5 ? '🏅' : '🎯'}</div>
                    <h3 class='text-2xl md:text-3xl font-bold text-gray-800'>Hoàn thành xuất sắc!</h3>
                    <p class='text-lg md:text-xl text-gray-600'>Điểm của bạn: <strong class='text-blue-700 text-2xl'>${practiceScore}/${currentPracticeSet.length}</strong></p>
                    <p class='text-lg md:text-xl font-bold ${color} mt-2'>${level}</p>
                    <button onclick='startPractice()' class='mt-6 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold text-lg shadow-md transition-all active:scale-95'>
                        Luyện tập bộ đề mới
                    </button>
                </div>`;
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('scamCheckHistory')) || [];
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-gray-600 text-lg md:col-span-2 text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-300">Chưa có tin nhắn nào được lưu trong lịch sử.</p>';
                return;
            }
            let html = "";
            for(let i=0; i<history.length; i++) {
                let item = history[i];
                let badgeColor = item.riskType === 'NGUY_HIEM' ? 'bg-red-100 text-red-800 border-red-200' : (item.riskType === 'NGHI_NGO' ? 'bg-yellow-100 text-yellow-800 border-yellow-200' : 'bg-green-100 text-green-800 border-green-200');
                
                html += `
                    <div onclick='viewSavedResult(${i})' class='p-5 bg-white border border-gray-200 rounded-xl shadow-sm hover:border-blue-400 hover:shadow-md cursor-pointer transition-all h-full flex flex-col'>
                        <div class='flex justify-between items-start mb-3 gap-3'>
                            <span class='text-xs font-medium text-gray-400 bg-gray-50 px-2 py-1 rounded border border-gray-100'>${item.time}</span>
                            <span class='px-2.5 py-1 rounded-md text-xs font-bold border shadow-sm ${badgeColor}'>
                                ${item.riskTitle}
                            </span>
                        </div>
                        <p class='text-gray-700 text-sm md:text-base line-clamp-3 italic bg-gray-50 p-3 rounded-lg flex-grow'>
                            "${item.text}"
                        </p>
                    </div>`;
            }
            historyList.innerHTML = html;
        }
        
        function saveToHistory(originalText, data) {
            let history = JSON.parse(localStorage.getItem('scamCheckHistory')) || [];
            history.unshift({
                text: originalText, 
                riskTitle: data.title, 
                riskType: data.risk, 
                desc: data.desc || '', 
                signs: data.signs || [], 
                quotes: data.quotes || [], 
                actions: data.actions || [], 
                coTamLyText: data.coTamLyText || null, 
                time: new Date().toLocaleString('vi-VN')
            });
            if (history.length > 20) history.pop();
            localStorage.setItem('scamCheckHistory', JSON.stringify(history));
            renderHistory();
        }
        
        function viewSavedResult(index) {
            let history = JSON.parse(localStorage.getItem('scamCheckHistory')) || [];
            const item = history[index];
            if (!item) return;
            document.getElementById('messageInput').value = item.text;
            renderResult({ 
                title: item.riskTitle, 
                risk: item.riskType, 
                desc: item.desc, 
                signs: item.signs, 
                quotes: item.quotes, 
                actions: item.actions, 
                coTamLyText: item.coTamLyText 
            }, item.text);
            
            renderUrlScanner(item.text);
            
            document.getElementById('situationalQuizArea').classList.add('hidden'); 
            document.getElementById('rescueArea').classList.add('hidden'); 
            
            switchTab('tab-home'); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearHistory() {
            if (confirm('Bác có chắc chắn muốn xóa toàn bộ lịch sử kiểm tra không? Dữ liệu này xóa sẽ không khôi phục lại được ạ.')) {
                localStorage.removeItem('scamCheckHistory');
                renderHistory();
            }
        }

        // Add custom animation styles dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.4s ease-out forwards;
            }
        `;
        document.head.appendChild(style);

        window.onload = () => {
            renderHistory();
            renderLibrary('all');
            startPractice();
        }; 
    </script>
</body>
</html>
