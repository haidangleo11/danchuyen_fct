<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamCheck - An toàn không gian số</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex justify-center">

    <div class="w-full max-w-md bg-white shadow-xl relative pb-20 flex flex-col min-h-screen">
        
        <header class="bg-blue-600 text-white p-4 text-center sticky top-0 z-10 shadow-md">
            <h1 class="text-2xl font-bold">ScamCheck</h1>
            <p class="text-sm opacity-90">Công cụ hỗ trợ an toàn số</p>
        </header>

        <main class="flex-grow p-4">
            <section id="tab-home" class="space-y-4">
                <label class="block text-gray-800 font-semibold text-lg">
                    Dán tin nhắn nghi ngờ vào đây:
                </label>
                <textarea id="messageInput" rows="5" class="w-full p-4 border-2 border-gray-300 rounded-xl focus:border-blue-500 outline-none text-lg" placeholder="Dán tin nhắn nghi ngờ vào đây..."></textarea>

                <div class="flex flex-wrap gap-2 mt-3 mb-3">
                    <button type="button" onclick="fillSample('bank')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg text-sm font-medium">🏦 Ngân hàng</button>
                    <button type="button" onclick="fillSample('police')" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm font-medium">👮 Công an</button>
                    <button type="button" onclick="fillSample('lottery')" class="bg-green-100 hover:bg-green-200 text-green-700 px-3 py-1.5 rounded-lg text-sm font-medium">🎁 Trúng thưởng</button>
                </div>
                                
                <button id="checkBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-xl hover:bg-blue-700 shadow-md transition">
                    🔍 Kiểm tra ngay
                </button>

                <div id="resultArea" class="hidden mt-6 space-y-4"></div>
                <div id="situationalQuizArea" class="hidden mt-4 p-4 bg-white border border-gray-200 rounded-xl shadow-sm space-y-3"></div>
                <div id="url-scanner-result" class="hidden mt-4 p-4 rounded-xl border transition-all"></div>
            </section>

            <section id="tab-history" class="hidden space-y-4">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-2">Lịch sử kiểm tra</h2>
                <div id="historyList" class="space-y-3">
                    <p class="text-gray-600 text-lg">Chưa có tin nhắn nào được kiểm tra gần đây.</p>
                </div>
            </section>

            <section id="tab-library" class="hidden space-y-4">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-2">Thư viện & Ứng cứu khẩn cấp</h2>
                
                <div class="flex flex-wrap gap-1.5 pb-2 border-b border-gray-100">
                    <button onclick="filterLibrary('all')" id="btn-filter-all" class="filter-btn bg-blue-600 text-white px-2.5 py-1 rounded-lg text-xs font-semibold shadow-sm transition">Tất cả</button>
                    <button onclick="filterLibrary('bank')" id="btn-filter-bank" class="filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-2.5 py-1 rounded-lg text-xs font-semibold transition">🏦 Ngân hàng</button>
                    <button onclick="filterLibrary('police')" id="btn-filter-police" class="filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-2.5 py-1 rounded-lg text-xs font-semibold transition">👮 Công an</button>
                    <button onclick="filterLibrary('lottery')" id="btn-filter-lottery" class="filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-2.5 py-1 rounded-lg text-xs font-semibold transition">🎁 Thưởng</button>
                    <button onclick="filterLibrary('delivery')" id="btn-filter-delivery" class="filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-2.5 py-1 rounded-lg text-xs font-semibold transition">📦 Giao hàng</button>
                    <button onclick="filterLibrary('hotline')" id="btn-filter-hotline" class="filter-btn bg-gray-100 text-gray-600 hover:bg-gray-200 px-2.5 py-1 rounded-lg text-xs font-semibold transition">📞 Tổng đài</button>
                </div>

                <div id="dynamicLibraryList" class="space-y-3"></div>
            </section>

            <section id="tab-practice" class="hidden space-y-4">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-2">Chế độ luyện tập</h2>
                <div id="practiceArea"></div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-300 flex justify-around text-gray-500 z-50">
            <button onclick="switchTab('tab-home')" class="flex-1 py-3 hover:text-blue-600 hover:bg-blue-50 transition flex flex-col items-center">
                <span class="text-2xl">🏠</span>
                <span class="text-sm font-semibold mt-1">Trang chủ</span>
            </button>
            <button onclick="switchTab('tab-history')" class="flex-1 py-3 border-l border-gray-200 hover:text-blue-600 hover:bg-blue-50 transition flex flex-col items-center">
                <span class="text-2xl">🕒</span>
                <span class="text-sm font-semibold mt-1">Lịch sử</span>
            </button>
            <button onclick="switchTab('tab-library')" class="flex-1 py-3 border-l border-gray-200 hover:text-blue-600 hover:bg-blue-50 transition flex flex-col items-center">
                <span class="text-2xl">📚</span>
                <span class="text-sm font-semibold mt-1">Thư viện</span>
            </button>
            <button onclick="switchTab('tab-practice')" class="flex-1 py-3 border-l border-gray-200 hover:text-blue-600 hover:bg-blue-50 transition flex flex-col items-center">
                <span class="text-2xl">🎯</span>
                <span class="text-sm font-semibold mt-1">Luyện tập</span>
            </button>
        </nav>
        
        <div class="absolute bottom-16 left-0 w-full bg-gray-100 text-center text-[10px] text-gray-500 p-2 border-t border-gray-200">
            ScamCheck là công cụ giáo dục do nhóm học viên phát triển và không thay thế cảnh báo chính thức.
        </div>

    </div>
    
    <script>
        const CONFIG = {
            GROQ_API_KEY: "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"
        };
        const CO_TAM_LY_PROMPT = `
            Bạn là "Cô tâm lý", một chuyên gia tư vấn tâm lý học hành vi chuyên hỗ trợ người cao tuổi phòng tránh lừa đảo mạng.
            Nhiệm vụ của bạn: Phân tích tin nhắn mà người dùng cung cấp và giải thích ngắn gọn cơ chế/chiêu thức tác động tâm lý (thao túng, đánh vào lòng tham, nỗi sợ hãi, sự khẩn cấp) mà kẻ lừa đảo đang sử dụng để khiến họ suýt tin.

            Yêu cầu nghiêm ngặt về phong cách:
            1. Giọng điệu: Gần gũi, ấm áp, thấu hiểu, tuyệt đối KHÔNG hù dọa, KHÔNG lên giọng dạy dỗ hay chỉ trích người dùng.
            2. Xưng hô: Bắt buộc xưng "cô" và gọi người dùng là "bác".
            3. Độ dài: Chỉ viết trong khoảng từ ĐÚNG 2 ĐẾN 3 CÂU.
        `;
        function switchTab(tabId) {
            document.getElementById('tab-home').classList.add('hidden');
            document.getElementById('tab-history').classList.add('hidden');
            document.getElementById('tab-library').classList.add('hidden');
            document.getElementById('tab-practice').classList.add('hidden');
            document.getElementById(tabId).classList.remove('hidden');
        }

        function fillSample(type) {
            const input = document.getElementById('messageInput');
            if(type === 'bank') input.value = "Tai khoan VCB cua ban se bi khoa sau 2h. Vui long dang nhap www.vcb-update.com de xac thuc.";
            if(type === 'police') input.value = "Bo Cong An thong bao: So dien thoai cua ban lien quan den vu an rua tien. Yeu cau chuyen tien vao tai khoan tam giu 123456789 de dieu tra.";
            if(type === 'lottery') input.value = "Chuc mung thue bao trung thuong 1 xe SH. Truoc khi nhan giai vui long nap the cao 500k de lam thu tuc xac minh.";
        }

        const SYSTEM_PROMPT = "Bạn là Thám tử phân tích tin nhắn lừa đảo. Trả về ĐÚNG 1 khối JSON duy nhất theo mẫu định dạng sau không kèm giải thích gì thêm ngoài JSON: " +
        "{\"risk\": \"NGUY_HIEM\", \"title\": \"Nguy hiểm khẩn cấp\", \"desc\": \"Lý do chi tiết...\", \"signs\": [\"Dấu hiệu 1\", \"Dấu hiệu 2\"], \"quotes\": [\"từ khóa nguy hiểm 1\"], \"actions\": [\"Biện pháp ứng cứu 1\"]}";

        //const CO_TAM_LY_PROMPT = "Bạn là một chuyên gia tâm lý học hành vi độc lập. Hãy phân tích tin nhắn lừa đảo sau đây và giải thích thật ngắn gọn trong khoảng 1 đến 2 câu bằng tiếng Việt xem kẻ lừa đảo đang đánh vào tâm lý nào của nạn nhân (ví dụ: nỗi sợ hãi cơ quan luật pháp, lòng tham phần thưởng lớn, hay áp lực thời gian khẩn cấp) để thao túng họ. Hãy dùng giọng điệu đồng cảm, nhẹ nhàng.";

        function cleanJsonText(text) {
            let t = String(text || '').trim();
            if (t.startsWith('```json')) t = t.substring(7);
            if (t.endsWith('```')) t = t.substring(0, t.length - 3);
            t = t.trim();
            const startIdx = t.indexOf('{');
            const endIdx = t.lastIndexOf('}');
            if (startIdx !== -1 && endIdx !== -1) {
                return t.substring(startIdx, endIdx + 1);
            }
            return t;
        }

        function normalizeResult(obj) {
            return {
                risk: obj?.risk || 'NGHI_NGO',
                title: obj?.title || 'Chưa rõ ràng',
                desc: obj?.desc || 'Hệ thống tạm thời không thể phân tích rõ.',
                signs: Array.isArray(obj?.signs) ? obj.signs : [],
                quotes: Array.isArray(obj?.quotes) ? obj.quotes : [],
                actions: Array.isArray(obj?.actions) ? obj.actions : [],
                coTamLyText: obj?.coTamLyText || null
            };
        }

        document.getElementById('checkBtn').addEventListener('click', async () => {
            const originalText = document.getElementById('messageInput').value.trim();
            const btn = document.getElementById('checkBtn');

            if (!originalText) {
                alert("Bác ơi, vui lòng điền tin nhắn vào trước khi bấm kiểm tra ạ!");
                return;
            }

            if (originalText.length > 5000) {
                alert("Tin nhắn này dài quá (hơn 5000 ký tự), bác vui lòng cắt bớt chỉ để lại phần chính nhé!");
                return;
            }

            if (!navigator.onLine) {
                alert("Máy bác đang không có mạng. Bác kiểm tra lại WiFi hoặc mạng 3G/4G/5G rồi thử lại nha!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "<span class='animate-pulse'>⏳ Thám tử đang phân tích...</span>";
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('situationalQuizArea').classList.add('hidden');
            document.getElementById('url-scanner-result').classList.add('hidden');

            let finalResult = normalizeResult({
                risk: 'NGHI_NGO',
                title: 'Chưa rõ ràng',
                desc: 'Hệ thống gặp sự cố kỹ thuật hoặc định dạng phản hồi không đúng cấu trúc đồ họa.',
                signs: ['Không thể phân tích dấu hiệu cụ thể.'],
                quotes: [],
                actions: ['Tạm thời không làm theo tin nhắn', 'Hỏi ý kiến từ người thân xung quanh']
            });

            try {
                // Lần gọi 1: Phân tích lừa đảo bằng API Groq (Trả về JSON)
                const response = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        response_format: { type: "json_object" },
                        messages: [
                            { role: "system", content: SYSTEM_PROMPT },
                            { role: "user", content: "Tin nhắn cần phân tích thực tế từ người dùng:\n\"" + originalText + "\"" }
                        ]
                    })
                });

                const data = await response.json();
                if (!data?.choices?.length) throw new Error('No candidates');
                if (data.choices[0].finish_reason && data.choices[0].finish_reason !== 'stop') throw new Error('AI refused to answer');

                const rawText = data.choices[0]?.message?.content || '';
                const aiText = cleanJsonText(rawText);
                finalResult = normalizeResult(JSON.parse(aiText));

                finalResult.coTamLyText = null;

                // Lần gọi 2: Phân tích tâm lý bằng API Groq (Trả về Text thông thường)
                if (finalResult.risk === 'NGHI_NGO' || finalResult.risk === 'NGUY_HIEM') {
                    try {
                        const responseCoTamLy = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${CONFIG.GROQ_API_KEY}`
                            },
                            body: JSON.stringify({
                                model: "llama-3.3-70b-versatile",
                                messages: [
                                    { role: "system", content: CO_TAM_LY_PROMPT },
                                    { role: "user", content: "Tin nhắn cần phân tích:\n\"" + originalText + "\"" }
                                ]
                            })
                        });
                        const dataCoTamLy = await responseCoTamLy.json();
                        const txt = dataCoTamLy?.choices?.[0]?.message?.content?.trim();
                        if (txt) finalResult.coTamLyText = txt;
                    } catch (coTamLyError) {
                        console.error("Lỗi khi gọi API Tâm lý:", coTamLyError);
                        finalResult.coTamLyText = 'Cô tâm lý hiện đang bận hỗ trợ các bác khác một chút, bác hãy thử lại sau nhé!';
                    }
                }
            } catch (error) {
                console.error("Lỗi khi gọi API Groq:", error);
                finalResult.desc = 'Hệ thống AI gặp lỗi xử lý dữ liệu. Bác hãy tạm thời nâng cao cảnh giác nhé!';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔍 Kiểm tra ngay';

                renderResult(finalResult, originalText);
                renderSituationalQuiz();
                renderUrlScanner(originalText);
                saveToHistory(originalText, finalResult);
            }
        });

        function highlightQuotes(text, quotes) {
            let result = String(text || '');
            (quotes || []).forEach(q => {
                if (!q) return;
                const escaped = String(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                result = result.replace(new RegExp(escaped, 'gi'), "<mark class='bg-yellow-300 px-1 rounded'>$&</mark>");
            });
            return result;
        }

        function renderResult(data, originalText) {
            const highlightedText = highlightQuotes(originalText, data.quotes || []);
            const resultArea = document.getElementById('resultArea');
            if (!resultArea) return;
            
            resultArea.classList.remove('hidden');
            resultArea.innerHTML = '';
            
            let cardColors = 'border-green-500 bg-green-50 text-green-700';
            let badgeColor = 'bg-green-100 text-green-800';
            
            if (data.risk === 'NGUY_HIEM') {
                cardColors = 'border-red-500 bg-red-50 text-red-700';
                badgeColor = 'bg-red-100 text-red-800';
            } else if (data.risk === 'NGHI_NGO') {
                cardColors = 'border-yellow-500 bg-yellow-50 text-yellow-700';
                badgeColor = 'bg-yellow-100 text-yellow-800';
            }

            let coTamLyHTML = '';
            if (data.coTamLyText) {
                coTamLyHTML = "<div class='mt-4 p-4 bg-purple-50 border border-purple-200 rounded-xl shadow-sm'><h4 class='text-md font-bold text-purple-800 mb-2 flex items-center gap-1'>🧠 Hiểu vì sao mình suýt tin?</h4><p class='text-gray-700 text-base leading-relaxed italic'>" + data.coTamLyText + "</p></div>";
            }

            let signsList = "";
            if (data.signs && data.signs.length > 0) {
                for(let i=0; i<data.signs.length; i++) {
                    signsList += "<li class='mt-1'>" + data.signs[i] + "</li>";
                }
            } else {
                signsList = "<li>Không tìm thấy dấu hiệu lừa đảo rõ ràng.</li>";
            }

            let quotesHTML = "";
            if (data.quotes && data.quotes.length > 0) {
                let quotesTags = "";
                for(let i=0; i<data.quotes.length; i++) {
                    quotesTags += "<span class='bg-orange-100 text-orange-800 text-xs font-mono px-2 py-0.5 rounded border border-orange-200'>\"" + data.quotes[i] + "\"</span> ";
                }
                quotesHTML = "<div class='mt-3 bg-orange-50 border border-orange-200 p-3 rounded-xl'><h5 class='font-bold text-orange-800 text-sm mb-1'>Cụm từ đáng ngờ trích xuất:</h5><div class='flex flex-wrap gap-1'>" + quotesTags + "</div></div>";
            }

            let actionsList = "";
            if (data.actions && data.actions.length > 0) {
                for(let i=0; i<data.actions.length; i++) {
                    actionsList += "<li>" + data.actions[i] + "</li>";
                }
            }
            let actionsHTML = actionsList ? "<div class='mt-3 bg-blue-50 border border-blue-200 p-3 rounded-xl'><h5 class='font-bold text-blue-800 text-sm mb-1'>Hành động khuyến nghị:</h5><ul class='list-decimal pl-4 text-base text-gray-700 space-y-1'>" + actionsList + "</ul></div>" : "";

            resultArea.innerHTML = 
                "<div class='flex justify-between items-center border-b pb-2'><h2 class='text-xl font-bold text-gray-800'>Kết quả phân tích:</h2><span class='px-3 py-1 rounded-full text-xs font-bold " + badgeColor + "'>" + (data.title || 'Chưa rõ') + "</span></div>" +
                "<div class='p-4 rounded-xl border-l-8 shadow-sm " + cardColors + "'><h3 class='text-2xl font-bold uppercase'>" + (data.title || 'Chưa rõ') + "</h3><p class='text-base text-gray-800 mt-2'>" + data.desc + "</p></div>" +
                "<div class='bg-yellow-50 border border-yellow-200 p-4 rounded-xl'><h4 class='font-bold mb-2'>📌 Đoạn tin được phân tích</h4><p class='leading-relaxed text-base break-words'>" + highlightedText + "</p></div>" +
                "<div class='bg-gray-50 p-4 rounded-xl border border-gray-200'><h4 class='font-bold text-lg mb-2'>Dấu hiệu nhận biết:</h4><ul class='list-disc pl-5 text-base text-gray-700 space-y-1'>" + signsList + "</ul>" + quotesHTML + actionsHTML + "</div>" +
                coTamLyHTML;
        }

        // TÍNH NĂNG 4 LỰA CHỌN PHẢN ỨNG TÌNH HUỐNG
        function renderSituationalQuiz() {
            const container = document.getElementById('situationalQuizArea');
            if (!container) return;
            container.classList.remove('hidden');

            container.innerHTML = 
                "<h3 class='font-bold text-lg text-gray-800 mb-3'>🤔 Khảo sát nhanh: Bác đã làm gì rồi?</h3>" +
                "<div class='flex flex-col gap-2.5' id='situational-buttons'>" +
                    "<button onclick=\"handleSituationalAnswer(this, 'nothing')\" class='sit-btn bg-white border-2 border-gray-300 text-gray-700 py-3.5 px-4 rounded-xl font-semibold text-left flex justify-between items-center transition-all shadow-sm'>" +
                        "<span>1. Chưa làm gì cả</span> <span class='text-2xl'>👍</span>" +
                    "</button>" +
                    "<button onclick=\"handleSituationalAnswer(this, 'clicked')\" class='sit-btn bg-white border-2 border-gray-300 text-gray-700 py-3.5 px-4 rounded-xl font-semibold text-left flex justify-between items-center transition-all shadow-sm'>" +
                        "<span>2. Đã bấm vào đường dẫn</span> <span class='text-2xl'>🖱️</span>" +
                    "</button>" +
                    "<button onclick=\"handleSituationalAnswer(this, 'transferred')\" class='sit-btn bg-white border-2 border-gray-300 text-gray-700 py-3.5 px-4 rounded-xl font-semibold text-left flex justify-between items-center transition-all shadow-sm'>" +
                        "<span>3. Đã chuyển khoản</span> <span class='text-2xl'>💸</span>" +
                    "</button>" +
                    "<button onclick=\"handleSituationalAnswer(this, 'otp')\" class='sit-btn bg-white border-2 border-gray-300 text-gray-700 py-3.5 px-4 rounded-xl font-semibold text-left flex justify-between items-center transition-all shadow-sm'>" +
                        "<span>4. Đã cung cấp mã xác thực</span> <span class='text-2xl'>🔑</span>" +
                    "</button>" +
                "</div>" +
                "<div id='situational-advice' class='hidden mt-4 p-4 rounded-xl text-base leading-relaxed border'></div>";
        }

        function handleSituationalAnswer(selectedButton, choice) {
            const buttons = document.querySelectorAll('.sit-btn');
            
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.classList.add('opacity-40', 'cursor-not-allowed');
                btn.classList.remove('shadow-sm', 'hover:bg-gray-50');
            });

            selectedButton.classList.remove('opacity-40', 'border-gray-300');
            selectedButton.classList.add('border-blue-500', 'bg-blue-50', 'text-blue-800', 'opacity-100');

            const adviceBox = document.getElementById('situational-advice');
            adviceBox.classList.remove('hidden');

            let adviceHTML = "";
            if (choice === 'nothing') {
                adviceBox.className = "mt-4 p-4 rounded-xl text-base leading-relaxed border border-green-200 bg-green-50 text-green-800";
                adviceHTML = "<strong>✅ Rất tốt! Bác đã rất cảnh giác.</strong><br>Hãy xóa ngay tin nhắn này, chặn số điện thoại/tài khoản người gửi và tuyệt đối không tò mò làm theo nhé.";
            } else if (choice === 'clicked') {
                adviceBox.className = "mt-4 p-4 rounded-xl text-base leading-relaxed border border-yellow-300 bg-yellow-50 text-yellow-800";

        function scanMessageUrls(text) {
            if (!text) return null;
            const urlRegex = /(https?:\/\/[^\s<>"]+|www\.[^\s<>"]+|[a-zA-Z0-9-]+\.(?:com|vn|net|org|gov|top|cc|xyz|info|club)(?:\/[^\s<>"]*)?)/gi;
            const matches = text.match(urlRegex);
            if (!matches) return [];
            return matches.map(url => {
                let cleanUrl = url.toLowerCase().trim();
                let isFake = false;
                let warningReason = '';
                let fakeType = '';
                if (cleanUrl.includes('vietcornbank')) {
                    isFake = true; fakeType = 'Thay thế ký tự (rn thành m)'; warningReason = "Chữ 'rn' viết dính nhau mạo danh Vietcombank.";
                } else if ((cleanUrl.includes('vcb') || cleanUrl.includes('vietcombank')) && !cleanUrl.includes('vietcombank.com.vn')) {
                    isFake = true; fakeType = 'Tên miền Ngân hàng giả mạo'; warningReason = 'Đường dẫn dùng đuôi lạ không khớp trang chủ.';
                } else if (cleanUrl.includes('vneid') && !cleanUrl.includes('gov.vn')) {
                    isFake = true; fakeType = 'Giả mạo Cổng dịch vụ công'; warningReason = 'VNeID chuẩn phải dùng đuôi .gov.vn của Chính phủ.';
                }
                return { originalUrl: url, isFake, fakeType, warningReason };
            });
        }

        function renderUrlScanner(originalText) {
            const container = document.getElementById('url-scanner-result');
            if (!container) return;
            const scannedLinks = scanMessageUrls(originalText);
            if (!scannedLinks || scannedLinks.length === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');
            const fakeCount = scannedLinks.filter(l => l.isFake).length;
            
            let html = "<div class='flex items-center gap-2 mb-3'><span class='text-lg'>🔗</span><h3 class='font-bold text-sm text-gray-800'>Kết quả soi đường dẫn (" + scannedLinks.length + " link)</h3></div>";
            container.className = fakeCount > 0 ? 'mt-4 p-4 rounded-xl border border-red-200 bg-red-50' : 'mt-4 p-4 rounded-xl border border-green-200 bg-green-50';
            
            scannedLinks.forEach(link => {
                if (link.isFake) {
                    html += "<div class='bg-white border border-red-200 rounded-lg p-3 mb-2 shadow-sm'><div class='flex items-center gap-1.5 mb-1 flex-wrap'><span class='bg-red-600 text-white font-extrabold text-[10px] px-2 py-0.5 rounded'>NGUY HIỂM</span><span class='text-xs font-bold text-red-700'>" + link.fakeType + "</span></div><p class='text-xs font-mono text-gray-500 bg-gray-50 p-1.5 rounded border break-all mb-1.5'>" + link.originalUrl + "</p><div class='text-[11px] text-red-600 font-medium bg-red-50 p-2 rounded border border-dashed border-red-200'>⚠️ <strong>Tuyệt đối không click:</strong> " + link.warningReason + "</div></div>";
                } else {
                    html += "<div class='bg-white border border-green-200 rounded-lg p-3 mb-2 shadow-sm'><div class='flex items-center gap-1.5 mb-1'><span class='bg-green-600 text-white font-extrabold text-[10px] px-2 py-0.5 rounded'>AN TOÀN</span><span class='text-xs text-gray-500'>Đường dẫn thông thường</span></div><p class='text-xs font-mono text-gray-600 bg-gray-50 p-1.5 rounded border break-all'>" + link.originalUrl + "</p></div>";
                }
            });
            container.innerHTML = html;
        }

        let practiceIndex = 0, practiceScore = 0, currentPracticeSet = [], currentSetNumber = 0, answeredPractice = false;
        let usedPracticeSets = [];

        function startPractice() {
            practiceIndex = 0;
            practiceScore = 0;
            answeredPractice = false;

            if (usedPracticeSets.length === PRACTICE_SETS.length) {
                usedPracticeSets = [];
            }

            let available = [];
            for (let i = 0; i < PRACTICE_SETS.length; i++) {
                if (!usedPracticeSets.includes(i)) {
                    available.push(i);
                }
            }

            const randomSetIndex =
                available[Math.floor(Math.random() * available.length)];

            usedPracticeSets.push(randomSetIndex);

            currentSetNumber = randomSetIndex + 1;

            currentPracticeSet = [...PRACTICE_SETS[randomSetIndex]]
                .sort(() => Math.random() - 0.5);

            renderPracticeQuestion();
        }
        function renderPracticeQuestion() {
            const area = document.getElementById('practiceArea');
            const q = currentPracticeSet[practiceIndex];
            if (!q) { renderPracticeResult(); return; }
            answeredPractice = false;
            
            let html = "<div class='bg-white p-4 rounded-xl shadow border border-gray-100 space-y-3'>" +
                "<div class='flex items-center justify-between gap-2'><h3 class='font-bold text-lg'>Bộ luyện tập #" + currentSetNumber + "</h3><span class='text-sm text-gray-500'>" + (practiceIndex + 1) + "/" + currentPracticeSet.length + "</span></div>" +
                "<div class='w-full h-2 bg-gray-200 rounded-full overflow-hidden'><div class='h-full bg-blue-600' style='width:" + (((practiceIndex) / currentPracticeSet.length) * 100) + "%'></div></div>" +
                "<div class='bg-gray-50 p-4 rounded-xl text-lg leading-relaxed'>" + q.text + "</div>" +
                "<div class='mt-2 grid grid-cols-2 gap-2'>" +
                    "<button id='practice-scam-btn' onclick='answerPractice(\"scam\")' class='bg-red-600 text-white py-3 rounded-xl font-bold text-lg'>🚨 Lừa đảo</button>" +
                    "<button id='practice-safe-btn' onclick='answerPractice(\"safe\")' class='bg-green-600 text-white py-3 rounded-xl font-bold text-lg'>✅ An toàn</button>" +
                "</div>" +
            "</div>";
            area.innerHTML = html;
        }

        function answerPractice(choice) {
            if (answeredPractice) return;
            answeredPractice = true;
            const q = currentPracticeSet[practiceIndex];
            const correct = choice === q.label;
            if (correct) practiceScore++;

            document.getElementById('practice-scam-btn').disabled = true;
            document.getElementById('practice-safe-btn').disabled = true;

            let resultClass = correct ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200';
            let titleText = correct ? '✅ Chính xác' : '❌ Chưa đúng';
            
            let feedbackHTML = "<div class='mt-4 p-4 rounded-xl " + resultClass + "'>" +
                "<h4 class='font-bold text-lg'>" + titleText + "</h4>" +
                "<p class='mt-2 text-base text-gray-700'>" + q.reason + "</p>" +
                "<button onclick='nextPractice()' class='mt-3 bg-blue-600 text-white px-4 py-2 rounded-xl font-bold'>Tiếp tục</button>" +
            "</div>";
            document.getElementById('practiceArea').insertAdjacentHTML('beforeend', feedbackHTML);
        }

        function nextPractice() {
            practiceIndex++;
            if (practiceIndex >= currentPracticeSet.length) { renderPracticeResult(); return; }
            renderPracticeQuestion();
        }

        function renderPracticeResult() {
            let level = practiceScore >= 8 ? 'Xuất sắc' : (practiceScore >= 5 ? 'Khá tốt' : 'Cần luyện thêm');
            document.getElementById('practiceArea').innerHTML = "<div class='bg-white p-5 rounded-xl shadow space-y-3 border border-gray-100'><h3 class='text-xl font-bold'>🎉 Hoàn thành</h3><p class='text-lg'>Điểm của bạn: <strong>" + practiceScore + "/" + currentPracticeSet.length + "</strong></p><p class='text-base text-gray-700'>Đánh giá: <strong>" + level + "</strong></p><button onclick='startPractice()' class='mt-2 bg-blue-600 text-white px-4 py-2 rounded-xl font-bold'>Làm lại</button></div>";
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('scamCheckHistory')) || [];
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-gray-600 text-lg">Chưa có tin nhắn nào được kiểm tra gần đây.</p>';
                return;
            }
            let html = "";
            for(let i=0; i<history.length; i++) {
                let item = history[i];
                let badgeColor = item.riskType === 'NGUY_HIEM' ? 'bg-red-100 text-red-800' : (item.riskType === 'NGHI_NGO' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800');
                html += "<div onclick='viewSavedResult(" + i + ")' class='p-4 bg-white border border-gray-200 rounded-xl shadow-sm hover:border-blue-400 cursor-pointer transition-all mb-3'>" +
                    "<div class='flex justify-between items-start mb-2 gap-2'><span class='text-xs text-gray-500'>" + item.time + "</span><span class='px-2 py-1 rounded text-xs font-bold " + badgeColor + "'>" + item.riskTitle + "</span></div>" +
                    "<p class='text-gray-800 text-sm line-clamp-2 italic'>\"" + item.text + "\"</p></div>";
            }
            historyList.innerHTML = html;
        }

        function saveToHistory(originalText, data) {
            let history = JSON.parse(localStorage.getItem('scamCheckHistory')) || [];
            history.unshift({
                text: originalText, riskTitle: data.title, riskType: data.risk, desc: data.desc || '', signs: data.signs || [], quotes: data.quotes || [], actions: data.actions || [], coTamLyText: data.coTamLyText || null, time: new Date().toLocaleString('vi-VN')
            });
            if (history.length > 10) history.pop();
            localStorage.setItem('scamCheckHistory', JSON.stringify(history));
            renderHistory();
        }

        function viewSavedResult(index) {
            let history = JSON.parse(localStorage.getItem('scamCheckHistory')) || [];
            const item = history[index];
            if (!item) return;
            document.getElementById('messageInput').value = item.text;
            renderResult({ title: item.riskTitle, risk: item.riskType, desc: item.desc, signs: item.signs, quotes: item.quotes, actions: item.actions, coTamLyText: item.coTamLyText }, item.text);
            renderUrlScanner(item.text);
            document.getElementById('situationalQuizArea').classList.add('hidden'); // Giấu câu hỏi khi xem lại
            switchTab('tab-home'); 
        }

        window.onload = () => {
            renderHistory();
            renderLibrary('all');
            startPractice();
        };
