<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- Thẻ quan trọng giúp giao diện tự động co giãn vừa vặn trên màn hình Safari iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamCheck - Công cụ kiểm tra tin nhắn lừa đảo</title>
    <!-- Tích hợp Tailwind CSS qua CDN nhanh gọn, không cần cài đặt -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between p-4 font-sans">

    <!-- KHUNG NỘI DUNG CHÍNH (Được căn giữa, vừa khít chiều rộng điện thoại) -->
    <main class="max-w-md w-full mx-auto bg-white p-6 rounded-xl shadow-md mt-6">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">ScamCheck</h1>
        
        <!-- Ô nhập liệu đủ lớn (Textarea) -->
        <div class="mb-5">
            <label for="messageInput" class="block text-gray-700 font-semibold mb-2 text-lg">
                Dán tin nhắn nghi ngờ vào đây:
            </label>
            <!-- text-lg đảm bảo font chữ hiển thị từ 18px trở lên giúp người lớn tuổi dễ đọc -->
            <textarea 
                id="messageInput" 
                rows="6" 
                class="w-full p-4 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 text-lg text-gray-800 placeholder-gray-400 shadow-inner"
                placeholder="Ví dụ: Chuc mung ban da trung thuong chuyen du lich..."></textarea>
        </div>

        <!-- Nút Kiểm tra to rõ, dễ bấm -->
        <button 
            id="checkBtn" 
            class="w-full bg-blue-600 text-white font-bold py-4 px-6 rounded-lg text-xl hover:bg-blue-700 active:scale-95 transition-transform shadow-md">
            Kiểm tra ngay
        </button>
        
        <!-- Khu vực hiển thị kết quả thô (Tạm thời ẩn đi, sẽ hiện ở các hạng mục sau) -->
        <div id="resultArea" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded-lg hidden">
            <h3 class="font-bold text-gray-700 text-lg mb-2">Kết quả phân tích:</h3>
            <p id="resultText" class="text-gray-800 text-lg whitespace-pre-line"></p>
        </div>
    </main>

    <!-- DÒNG LƯU Ý PHÁP LÝ BẮT BUỘC (Luôn cố định ở chân trang) -->
    <footer class="max-w-md w-full mx-auto text-center text-xs text-gray-500 p-4 mt-8 border-t border-gray-200 leading-relaxed">
        ScamCheck là công cụ giáo dục do nhóm học viên phát triển và đánh giá của ứng dụng không thay thế cảnh báo chính thức từ ngân hàng hoặc cơ quan chức năng. Khi nghi ngờ, người dùng nên gọi tổng đài chính thức của ngân hàng được in trên thẻ.
    </footer>

    <!-- LOGIC SỰ KIỆN CƠ BẢN -->
    <script src="config.js"></script>

    <script>
        // Thêm từ khóa 'async' vào hàm để sử dụng được lệnh chờ 'await'
        document.getElementById('checkBtn').addEventListener('click', async () => {
            const text = document.getElementById('messageInput').value.trim();
            if (!text) {
                alert('Bác ơi, vui lòng dán hoặc nhập nội dung tin nhắn trước khi bấm kiểm tra ạ!');
                return;
            }
            
            const resultArea = document.getElementById('resultArea');
            const resultText = document.getElementById('resultText');
            const checkBtn = document.getElementById('checkBtn');
            
            // 1. Hiển thị trạng thái đang tải (Loading) để người dùng khỏi sốt ruột
            resultArea.classList.remove('hidden');
            resultText.innerText = "⏳ Hệ thống đang phân tích tin nhắn, bác đợi một chút nhé...";
            checkBtn.disabled = true; // Khóa nút bấm tạm thời
            checkBtn.classList.add('opacity-50', 'cursor-not-allowed');
            checkBtn.innerText = "Đang kiểm tra...";

            try {
                // 2. Chuẩn bị URL và Prompt gửi cho Gemini (Dùng bản 1.5 Flash cho tốc độ siêu nhanh)
                const apiKey = CONFIG.GEMINI_API_KEY;
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                // Prompt thô cho Cấp 1
                const prompt = `Bác tôi 50 tuổi nhận được tin nhắn sau: "${text}". Hãy phân tích ngắn gọn trong 3-4 câu xem đây có phải lừa đảo không và giải thích vì sao.`;

                // 3. Lệnh gọi mạng bất đồng bộ (fetch)
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`Lỗi kết nối mạng: ${response.status}`);
                }

                const data = await response.json();

                // 4. Bóc tách kết quả văn bản thô từ AI trả về
                const aiResponse = data.candidates[0].content.parts[0].text;

                // 5. Hiển thị kết quả ra màn hình
                resultText.innerText = aiResponse;

            } catch (error) {
                console.error("Lỗi khi gọi API:", error);
                resultText.innerText = "❌ Xin lỗi bác, hệ thống đang bận hoặc gặp lỗi mạng. Bác vui lòng thử lại sau nhé!";
            } finally {
                // 6. Hoàn tất thì mở khóa nút bấm lại như cũ
                checkBtn.disabled = false;
                checkBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                checkBtn.innerText = "Kiểm tra ngay";
            }
        });
    </script>
</body>
</html>
